# Développement local : Postgres, Redis, Django (runserver), Celery, Nginx, Next.js (pnpm dev + hot reload).
# Usage : docker compose -f docker-compose.dev.yml up -d --build
# Ou : ./scripts/stack.sh dev  (ou menu choix 1)

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    pull_policy: if_not_present
    environment:
      POSTGRES_USER: photoevent
      POSTGRES_PASSWORD: photoevent
      POSTGRES_DB: photoevent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoevent -d photoevent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    pull_policy: if_not_present
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
      pull: false
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ${SECRET_KEY:-change-me-docker}
      DATABASE_URL: postgres://photoevent:photoevent@postgres:5432/photoevent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,django,nginx
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost}
      PUBLIC_FRONTEND_BASE_URL: ${PUBLIC_FRONTEND_BASE_URL:-http://localhost:3000}
      PUBLIC_BACKEND_BASE_URL: ${PUBLIC_BACKEND_BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-auto}
      FEDAPAY_API_KEY: ${FEDAPAY_API_KEY:-}
      FEDAPAY_ENV: ${FEDAPAY_ENV:-sandbox}
      FEDAPAY_WEBHOOK_SECRET: ${FEDAPAY_WEBHOOK_SECRET:-}
      APP_NAME: ${APP_NAME:-}
      COLOR_PRIMARY: ${COLOR_PRIMARY:-}
      COLOR_SECONDARY: ${COLOR_SECONDARY:-}
      COLOR_WHITE: ${COLOR_WHITE:-}
      DJANGO_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      pull: false
    command: ["celery", "-A", "config", "worker", "-l", "INFO"]
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ${SECRET_KEY:-change-me-docker}
      DATABASE_URL: postgres://photoevent:photoevent@postgres:5432/photoevent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,django
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      FEDAPAY_API_KEY: ${FEDAPAY_API_KEY:-}
      FEDAPAY_ENV: ${FEDAPAY_ENV:-sandbox}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    pull_policy: if_not_present
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_volume:/var/www/media:ro
      - static_volume:/var/www/static:ro
    depends_on:
      - django

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      pull: false
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
      - frontend_pnpm_store:/pnpm/store
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
      NEXT_PUBLIC_FEDAPAY_PUBLIC_KEY: ${NEXT_PUBLIC_FEDAPAY_PUBLIC_KEY:-}
      NEXT_PUBLIC_FEDAPAY_ENV: ${NEXT_PUBLIC_FEDAPAY_ENV:-sandbox}
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /pnpm/store
    command:
      - sh
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@9.14.4 --activate
        pnpm config set store-dir "$$PNPM_STORE_DIR"
        pnpm install --frozen-lockfile --force
        pnpm dev -H 0.0.0.0 -p 3000
    depends_on:
      - nginx

volumes:
  pgdata:
  media_volume:
  static_volume:
  frontend_node_modules:
  frontend_next:
  frontend_pnpm_store:
